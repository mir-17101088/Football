<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Football Diaspora</title>

    <!-- Meta tags for SEO -->
    <meta name="description"
        content="An interactive migration map visualizing the global roots of foreign-born international football players, analyzing colonial pipelines, talent factories, and refugee resettlement journeys.">
    <meta name="keywords"
        content="football, migration, data visualization, maplibre, map, sports, data journalism, infographics">

    <!-- Google Fonts: Lora (serif) & Inter (sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        // Breakpoint for embedded iframe size (700px)
                        'desktop': '700px',
                    },
                    colors: {
                        brand: {
                            navy: '#0f172a',
                            warmBg: '#faf8f5',
                            cardBg: '#fcfbfa',
                            coral: '#e07a5f',
                            amber: '#f59e0b',
                            textMuted: '#64748b',
                            borderMuted: '#e2e8f0',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Lora', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #faf8f5;
            color: #0f172a;
        }

        #map {
            /* Sepia and styling filter to achieve an elegant warm editorial look on raster tiles */
            filter: sepia(0.2) contrast(0.95) brightness(1.02);
            background-color: #faf8f5;
        }

        /* Hide scrollbars for slick editorial panels */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Responsive Layout Rules based on 700px width limit with dynamic width sidebar */
        @media (min-width: 700px) {
            .desktop-only {
                display: flex !important;
            }

            .mobile-only {
                display: none !important;
            }

            #sidebar-wrapper {
                height: 100vh;
                position: relative;
                z-index: 10;
            }

            #map-wrapper {
                height: 100vh;
                position: relative;
            }
        }

        @media (max-width: 699px) {
            .desktop-only {
                display: none !important;
            }

            .mobile-only {
                display: block !important;
            }

            #sidebar-wrapper {
                display: none !important;
            }

            #map-wrapper {
                width: 100%;
                height: 100vh;
                position: absolute;
                left: 0;
                top: 0;
            }
        }

        /* Sidebar Collapsed Animation Styles */
        #sidebar-wrapper {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar-wrapper.sidebar-collapsed {
            width: 0 !important;
            min-width: 0 !important;
            max-width: 0 !important;
            border-right-width: 0 !important;
            padding: 0 !important;
            opacity: 0;
            pointer-events: none;
        }

        /* MapLibre custom styles */
        .maplibregl-ctrl-group button {
            background-color: #fcfbfa !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }

        .maplibregl-ctrl-group button span {
            filter: invert(0.1);
        }

        .maplibregl-ctrl-compass {
            display: none !important;
        }
    </style>
</head>

        let selectedEntity = null; // { type: 'squad'|'origin'|'player', name: string }
        let drawerState = 'collapsed'; // 'collapsed', 'half', 'expanded'

        // Helper to swap [lat, lng] to [lng, lat] for MapLibre
        function getHubCoords(teamName) {
            const coords = nationalTeamHubs[teamName];
            return coords ? [coords[1], coords[0]] : null;
        }

        function getCentroidCoords(countryName) {
            const coords = countryCentroids[countryName];
            return coords ? [coords[1], coords[0]] : null;
        }

        // Helper to generate flag image tag dynamically
        function getFlagTag(teamName) {
            const code = teamIsoCodes[teamName];
            return code ? `<img src="https://flagcdn.com/16x12/${code}.png" class="inline-block mr-1.5 align-middle shadow-sm rounded-sm" alt="" />` : '';
        }

        // Helper to remove duplicate country suffix from birth town names
        function cleanTownName(town, country) {
            if (!town) return '';
            let clean = town.trim();
            const countryTrimmed = country.trim();

            const townNotSpecifiedRegex = new RegExp(`^${countryTrimmed}\\s*\\(town not specified\\)$`, 'i');
            if (townNotSpecifiedRegex.test(clean)) {
                return "Town not specified";
            }

            const escapedCountry = countryTrimmed.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const endCountryRegex = new RegExp(`[,\\s-]*${escapedCountry}[.\\s]*$`, 'i');
            if (endCountryRegex.test(clean)) {
                clean = clean.replace(endCountryRegex, '');
            }

            clean = clean.trim().replace(/,$/, '').trim();
            if (!clean || clean.toLowerCase() === countryTrimmed.toLowerCase()) {
                return '';
            }
            return clean;
        }

        // Geodesic Great Circle Line Interpolation
        function interpolateGreatCircle(p1, p2, segments = 60) {
            let lng1 = p1[0];
            let lat1 = p1[1] * Math.PI / 180;
            let lng2 = p2[0];
            let lat2 = p2[1] * Math.PI / 180;

            // Handle antimeridian wrap: choose shortest path
            if (Math.abs(lng2 - lng1) > 180) {
                if (lng2 > lng1) {
                    lng2 -= 360;
                } else {
                    lng2 += 360;
                }
            }

            const lng1Rad = lng1 * Math.PI / 180;
            const lng2Rad = lng2 * Math.PI / 180;

            const d = 2 * Math.asin(Math.sqrt(
                Math.pow(Math.sin((lat1 - lat2) / 2), 2) +
                Math.cos(lat1) * Math.cos(lat2) * Math.pow(Math.sin((lng1Rad - lng2Rad) / 2), 2)
            ));

            if (d === 0) return [[p1[0], p1[1]]];

            const coords = [];
            for (let i = 0; i <= segments; i++) {
                const f = i / segments;
                const A = Math.sin((1 - f) * d) / Math.sin(d);
                const B = Math.sin(f * d) / Math.sin(d);

                const x = A * Math.cos(lat1) * Math.cos(lng1Rad) + B * Math.cos(lat2) * Math.cos(lng2Rad);
                const y = A * Math.cos(lat1) * Math.sin(lng1Rad) + B * Math.cos(lat2) * Math.sin(lng2Rad);
                const z = A * Math.sin(lat1) + B * Math.sin(lat2);

                const lat = Math.atan2(z, Math.sqrt(x * x + y * y));
                const lng = Math.atan2(y, x);

                coords.push([lng * 180 / Math.PI, lat * 180 / Math.PI]);
            }
            return coords;
        }

        // Initialize Map
        function initMap() {
            map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'carto-light': {
                            type: 'raster',
                            tiles: [
                                'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                                'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                                'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                                'https://d.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
                            ],
                            tileSize: 256,
                            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
                        }
                    },
                    layers: [
                        {
                            id: 'carto-light-layer',
                            type: 'raster',
                            source: 'carto-light',
                            minzoom: 0,
                            maxzoom: 18
                        }
                    ]
                },
                center: [10, 20],
                zoom: 1.5,
                minZoom: 1.1,
                maxZoom: 10,
                cooperativeGestures: false, // Allow single finger movement on mobile
                dragRotate: false,          // Disable map rotation via dragging
                touchPitch: false           // Disable pinch-to-pitch gesture
            });

            // Disable pinch-to-rotate gesture on mobile, retaining pinch-to-zoom
            if (map.touchZoomRotate) {
                map.touchZoomRotate.disableRotation();
            }

            // Controls
            map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');

            map.on('load', () => {
                setupMapSources();
                setupMapLayers();
                setupMapEvents();

                // Trigger initial render
                selectPreset('global');
            });
        }

        // Group players into aggregated view properties
        function getAggregatedData() {
            const squads = {};
            const origins = {};

            PLAYERS_DATA.forEach(p => {
                // Importers aggregation
                const t = p['National Team'];
                if (!squads[t]) {
                    squads[t] = { country: t, count: 0, coords: getHubCoords(t), players: [] };
                }
                squads[t].count++;
                squads[t].players.push(p);

                // Exporters aggregation
                const o = p['Birth country'];
                if (!origins[o]) {
                    origins[o] = { country: o, count: 0, coords: getCentroidCoords(o), players: [] };
                }
                origins[o].count++;
                origins[o].players.push(p);
            });

            return { squads, origins };
        }

        // Setup Map Sources
        function setupMapSources() {
            const { squads, origins } = getAggregatedData();

            // 1. Squad Nodes GeoJSON
            const squadsFeatures = Object.values(squads)
                .filter(s => s.coords !== null)
                .map(s => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: s.coords },
                    properties: { country: s.country, count: s.count, type: 'squad' }
                }));

            map.addSource('squads-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: squadsFeatures }
            });

            // 2. Origins Nodes GeoJSON
            const originsFeatures = Object.values(origins)
                .filter(o => o.coords !== null)
                .map(o => ({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: o.coords },
                    properties: { country: o.country, count: o.count, type: 'origin' }
                }));

            map.addSource('origins-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: originsFeatures }
            });

            // 3. Migration Paths GeoJSON (Interpolated Lines)
            const linesFeatures = PLAYERS_DATA.map((p, idx) => {
                const start = [p.Longitude, p.Latitude];
                const end = getHubCoords(p['National Team']);

                if (!start[0] || !start[1] || !end) return null;

                const arc = interpolateGreatCircle(start, end);

                return {
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: arc },
                    properties: {
                        id: idx,
                        name: p.name,
                        pos: p.Pos,
                        club: p.Club,
                        group: p.Group,
                        birthTown: p['Birth town'],
                        birthCountry: p['Birth country'],
                        nationalTeam: p['National Team']
                    }
                };
            }).filter(f => f !== null);

            map.addSource('migration-paths-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: linesFeatures },
                lineMetrics: true // Required for beautiful line-gradient rendering
            });

            // 4. Selected Path Source (glowing line overlay on top)
            map.addSource('selected-path-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });

            // 5. Birthplaces details Source (active when a country is selected)
            map.addSource('birth-towns-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });

            // 6. Centroid halo rings (active highlight marker)
            map.addSource('highlighted-node-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });
        }

        // Setup Map Layers
        function setupMapLayers() {
            // 1. Migration paths (lines) - Rendered beneath country nodes
            map.addLayer({
                id: 'migration-paths-layer',
                type: 'line',
                source: 'migration-paths-source',
                layout: {
                    'line-cap': 'round',
                    'line-join': 'round'
                },
                paint: {
                    'line-width': 1.2,
                    'line-opacity': 0.24,
                    'line-gradient': [
                        'interpolate',
                        ['linear'],
                        ['line-progress'],
                        0.0, 'rgba(239, 68, 68, 0.25)', // stark red with slight transparency at birthplace
                        1.0, 'rgba(220, 38, 38, 0.95)'  // solid stark red at squad hub
                    ]
                }
            });

            // 2. Active highlighted single player path layer
            map.addLayer({
                id: 'selected-path-layer',
                type: 'line',
                source: 'selected-path-source',
                layout: {
                    'line-cap': 'round',
                    'line-join': 'round'
                },
                paint: {
                    'line-width': 3.0,
                    'line-color': '#991b1b', // deep premium crimson
                    'line-opacity': 0.95
                }
            });

            // 3. Highlighted Node Circle Halo (Rings)
            map.addLayer({
                id: 'highlighted-node-layer',
                type: 'circle',
                source: 'highlighted-node-source',
                paint: {
                    'circle-radius': 18,
                    'circle-color': '#991b1b',
                    'circle-opacity': 0.25,
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#991b1b'
                }
            });

            // 4. Squad Circles (Importers)
            map.addLayer({
                id: 'squads-layer',
                type: 'circle',
                source: 'squads-source',
                paint: {
                    // Proportional sizing: min count 1 -> 6px, max count 25 -> 24px
                    'circle-radius': [
                        'interpolate',
                        ['linear'],
                        ['get', 'count'],
                        1, 6,
                        25, 24
                    ],
                    'circle-color': '#0f172a', // Deep Slate/Navy
                    'circle-opacity': 0.75,
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#faf8f5'
                }
            });

            // 5. Squad labels inside circles (count)
            map.addLayer({
                id: 'squads-text-layer',
                type: 'symbol',
                source: 'squads-source',
                layout: {
                    'text-field': ['get', 'count'],
                    'text-size': 9,
                    'text-offset': [0, 0],
                    'text-justify': 'center'
                },
                paint: {
                    'text-color': '#faf8f5',
                    'text-opacity': [
                        'case',
                        ['>=', ['get', 'count'], 3], 1.0,
                        0.0
                    ]
                }
            });

            // 6. Origins Circles (Exporters)
            map.addLayer({
                id: 'origins-layer',
                type: 'circle',
                source: 'origins-source',
                paint: {
                    // Proportional sizing: min count 1 -> 6px, max count 76 -> 32px
                    'circle-radius': [
                        'interpolate',
                        ['linear'],
                        ['get', 'count'],
                        1, 6,
                        76, 32
                    ],
                    'circle-color': '#e07a5f', // Terracotta Coral
                    'circle-opacity': 0.75,
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#faf8f5'
                }
            });

            // 7. Origins labels inside circles (count)
            map.addLayer({
                id: 'origins-text-layer',
                type: 'symbol',
                source: 'origins-source',
                layout: {
                    'text-field': ['get', 'count'],
                    'text-size': 9,
                    'text-offset': [0, 0],
                    'text-justify': 'center'
                },
                paint: {
                    'text-color': '#faf8f5',
                    'text-opacity': [
                        'case',
                        ['>=', ['get', 'count'], 3], 1.0,
                        0.0
                    ]
                }
            });

            // 8. Individual player Birth Towns (small dots when a country node is selected)
            map.addLayer({
                id: 'birth-towns-layer',
                type: 'circle',
                source: 'birth-towns-source',
                paint: {
                    'circle-radius': 5,
                    'circle-color': '#991b1b',
                    'circle-stroke-width': 1.5,
                    'circle-stroke-color': '#faf8f5'
                }
            });
        }

        // Setup Map Interactions & Events
        function setupMapEvents() {
            const interactiveLayers = ['squads-layer', 'origins-layer', 'birth-towns-layer', 'migration-paths-layer'];

            // Pointer cursor on hover
            interactiveLayers.forEach(lyr => {
                map.on('mouseenter', lyr, () => {
                    map.getCanvas().style.cursor = 'pointer';
                });
                map.on('mouseleave', lyr, () => {
                    map.getCanvas().style.cursor = '';
                });
            });

            // Clicks on Squads circles
            map.on('click', 'squads-layer', (e) => {
                const feat = e.features[0];
                selectCountry(feat.properties.country, 'squad');
            });

            // Clicks on Origins circles
            map.on('click', 'origins-layer', (e) => {
                const feat = e.features[0];
                selectCountry(feat.properties.country, 'origin');
            });

            // Clicks on Birth town circles
            map.on('click', 'birth-towns-layer', (e) => {
                const feat = e.features[0];
                const props = feat.properties;
                const player = PLAYERS_DATA.find(p => p.name === props.name);
                if (player) selectPlayer(player);
            });

            // Clicks on migration lines
            map.on('click', 'migration-paths-layer', (e) => {
                const feat = e.features[0];
                const player = PLAYERS_DATA[feat.properties.id];
                if (player) selectPlayer(player);
            });

            // Desktop Hover Tooltips (with flags)
            map.on('mousemove', (e) => {
                if (window.innerWidth < 700) return; // Touch on mobile, no hover tooltips

                const hoverFeats = map.queryRenderedFeatures(e.point, {
                    layers: ['squads-layer', 'origins-layer', 'birth-towns-layer', 'migration-paths-layer']
                });

                const tooltip = document.getElementById('tooltip');
                if (hoverFeats.length > 0) {
                    const f = hoverFeats[0];
                    tooltip.classList.remove('hidden');
                    tooltip.style.left = (e.originalEvent.clientX + 10) + 'px';
                    tooltip.style.top = (e.originalEvent.clientY + 12) + 'px';

                    let content = '';
                    if (f.layer.id === 'squads-layer') {
                        const flag = getFlagTag(f.properties.country);
                        content = `<strong>${flag}${f.properties.country}</strong><br>${f.properties.count} foreign-born players`;
                    } else if (f.layer.id === 'origins-layer') {
                        const flag = getFlagTag(f.properties.country);
                        content = `<strong>Born in ${flag}${f.properties.country}</strong><br>${f.properties.count} players`;
                    } else if (f.layer.id === 'birth-towns-layer') {
                        const flag = getFlagTag(f.properties.birthCountry);
                        const cleanTown = cleanTownName(f.properties.birthTown, f.properties.birthCountry);
                        content = `<strong>${f.properties.name}</strong> (${f.properties.pos})<br>Born in ${cleanTown ? cleanTown + ', ' : ''}${flag}${f.properties.birthCountry}`;
                    } else if (f.layer.id === 'migration-paths-layer') {
                        const startFlag = getFlagTag(f.properties.birthCountry);
                        const flag = getFlagTag(f.properties.nationalTeam);
                        content = `<strong>${f.properties.name}</strong> (${f.properties.pos})<br>${startFlag}${f.properties.birthCountry} &rarr; ${flag}${f.properties.nationalTeam}`;
                    }
                    tooltip.innerHTML = content;
                } else {
                    tooltip.classList.add('hidden');
                }
            });

            map.on('mouseleave', 'squads-layer', () => { document.getElementById('tooltip').classList.add('hidden'); });
            map.on('mouseleave', 'origins-layer', () => { document.getElementById('tooltip').classList.add('hidden'); });
            map.on('mouseleave', 'birth-towns-layer', () => { document.getElementById('tooltip').classList.add('hidden'); });
            map.on('mouseleave', 'migration-paths-layer', () => { document.getElementById('tooltip').classList.add('hidden'); });
        }

        // Set active preset beats
        function selectPreset(preset) {
            activePreset = preset;
            selectedEntity = null;

            // Clear selections on map
            map.getSource('selected-path-source').setData({ type: 'FeatureCollection', features: [] });
            map.getSource('birth-towns-source').setData({ type: 'FeatureCollection', features: [] });
            map.getSource('highlighted-node-source').setData({ type: 'FeatureCollection', features: [] });

            // Update preset buttons styling (Desktop)
            const buttons = ['preset-global', 'preset-factories'];
            buttons.forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                if (id === `preset-${preset}`) {
                    btn.classList.add('border-brand-navy', 'bg-brand-navy', 'text-[#faf8f5]');
                    btn.classList.remove('border-brand-borderMuted', 'text-brand-navy');
                } else {
                    btn.classList.remove('border-brand-navy', 'bg-brand-navy', 'text-[#faf8f5]');
                    btn.classList.add('border-brand-borderMuted', 'text-brand-navy');
                }
            });

            // Update preset buttons styling (Mobile)
            const mButtons = ['m-preset-global', 'm-preset-factories'];
            mButtons.forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                if (id === `m-preset-${preset}`) {
                    btn.classList.add('border-brand-navy', 'bg-brand-navy', 'text-[#faf8f5]');
                    btn.classList.remove('border-brand-borderMuted', 'text-brand-navy');
                } else {
                    btn.classList.remove('border-brand-navy', 'bg-brand-navy', 'text-[#faf8f5]');
                    btn.classList.add('border-brand-borderMuted', 'text-brand-navy');
                }
            });

            // Reset Search input
            document.getElementById('desktop-search').value = '';
            document.getElementById('mobile-search').value = '';
            document.getElementById('desktop-search-clear').classList.add('hidden');
            document.getElementById('mobile-search-clear').classList.add('hidden');

            if (preset === 'global') {
                setViewMode('squads', false);
                map.flyTo({ center: [12, 18], zoom: 1.5, speed: 0.8 });
                map.setPaintProperty('migration-paths-layer', 'line-opacity', 0.24);
                renderIntroPanel();
            }
            else if (preset === 'factories') {
                setViewMode('origins', false);
                map.flyTo({ center: [8, 48], zoom: 4.0, speed: 0.8 });

                // Highlight paths exported from FR, NL, DE
                map.setPaintProperty('migration-paths-layer', 'line-opacity', [
                    'case',
                    ['in', ['get', 'birthCountry'], ['literal', ['France', 'Netherlands', 'Germany']]], 0.65,
                    0.05
                ]);
                renderPresetPanel('factories');
            }

            setDrawerHeight('collapsed');
        }

        // Switch View Modes: Squads (importers) vs Origins (exporters)
        function setViewMode(mode, resetSelection = true) {
            viewMode = mode;

            if (map && map.getLayer('squads-layer')) {
                if (mode === 'squads') {
                    map.setLayoutProperty('squads-layer', 'visibility', 'visible');
                    map.setLayoutProperty('squads-text-layer', 'visibility', 'visible');
                    map.setLayoutProperty('origins-layer', 'visibility', 'none');
                    map.setLayoutProperty('origins-text-layer', 'visibility', 'none');
                } else {
                    map.setLayoutProperty('squads-layer', 'visibility', 'none');
                    map.setLayoutProperty('squads-text-layer', 'visibility', 'none');
                    map.setLayoutProperty('origins-layer', 'visibility', 'visible');
                    map.setLayoutProperty('origins-text-layer', 'visibility', 'visible');
                }
            }

            if (resetSelection) {
                selectedEntity = null;
                map.getSource('selected-path-source').setData({ type: 'FeatureCollection', features: [] });
                map.getSource('birth-towns-source').setData({ type: 'FeatureCollection', features: [] });
                map.getSource('highlighted-node-source').setData({ type: 'FeatureCollection', features: [] });
                map.setPaintProperty('migration-paths-layer', 'line-opacity', 0.24);
                renderIntroPanel();
                setDrawerHeight('collapsed');
            }
        }

        // Select specific country node (Squad or Origin)
        function selectCountry(countryName, type) {
            selectedEntity = { type: type, name: countryName };
            activePreset = null;

            // Remove presets highlight styling
            ['preset-global', 'preset-factories'].forEach(id => {
                document.getElementById(id).className = "px-2.5 py-2 text-xs font-semibold text-center border rounded-lg transition-all duration-200 border-brand-borderMuted text-brand-navy hover:bg-[#faf8f5]";
            });
            ['m-preset-global', 'm-preset-factories'].forEach(id => {
                document.getElementById(id).className = "py-1 px-1 text-[9px] font-bold text-center border rounded-md border-brand-borderMuted text-brand-navy";
            });

            const hubCoords = getHubCoords(countryName);
            const centroidCoords = getCentroidCoords(countryName);

            // 1. Center map on node
            if (type === 'squad' && hubCoords) {
                map.flyTo({ center: hubCoords, zoom: 4.2, speed: 0.8 });
                // Highlight circle ring
                map.getSource('highlighted-node-source').setData({
                    type: 'FeatureCollection',
                    features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: hubCoords } }]
                });
            } else if (type === 'origin' && centroidCoords) {
                map.flyTo({ center: centroidCoords, zoom: 4.2, speed: 0.8 });
                // Highlight circle ring
                map.getSource('highlighted-node-source').setData({
                    type: 'FeatureCollection',
                    features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: centroidCoords } }]
                });
            }

            // 2. Filter migration paths: highlight selected country paths, dim others
            if (type === 'squad') {
                map.setPaintProperty('migration-paths-layer', 'line-opacity', [
                    'case',
                    ['==', ['get', 'nationalTeam'], countryName], 0.70,
                    0.05
                ]);
            } else {
                map.setPaintProperty('migration-paths-layer', 'line-opacity', [
                    'case',
                    ['==', ['get', 'birthCountry'], countryName], 0.70,
                    0.05
                ]);
            }

            // 3. Clear selected player glowing path line
            map.getSource('selected-path-source').setData({ type: 'FeatureCollection', features: [] });

            // 4. Draw player birth towns as small active dots
            const filteredPlayers = PLAYERS_DATA.filter(p =>
                (type === 'squad' && p['National Team'] === countryName) ||
                (type === 'origin' && p['Birth country'] === countryName)
            );

            const birthTownFeatures = filteredPlayers.map(p => ({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [p.Longitude, p.Latitude] },
                properties: { name: p.name, pos: p.Pos, club: p.Club, birthTown: p['Birth town'], birthCountry: p['Birth country'] }
            }));

            map.getSource('birth-towns-source').setData({
                type: 'FeatureCollection',
                features: birthTownFeatures
            });

            // 5. Render list and open Mobile sheet
            renderCountryPanel(countryName, type, filteredPlayers);
            setDrawerHeight('half');
        }

        // Select specific Player
        function selectPlayer(player) {
            selectedEntity = { type: 'player', name: player.name };
            activePreset = null;

            // Remove presets highlight styling
            ['m-preset-global', 'm-preset-factories'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.className = "py-1 px-1 text-[9px] font-bold text-center border rounded-md border-brand-borderMuted text-brand-navy";
            });

            // 1. Plot highlighted single glowing great circle path
            const start = [player.Longitude, player.Latitude];
            const end = getHubCoords(player['National Team']);
            if (start[0] && start[1] && end) {
                const arc = interpolateGreatCircle(start, end);
                map.getSource('selected-path-source').setData({
                    type: 'Feature',
                    geometry: { type: 'LineString', coordinates: arc },
                    properties: {}
                });

                // Fit map screen bounds to contain both points in the arc
                fitBoundsToCoordinates(start, end);
            }

            // 2. Set halo circles at birth and destination
            const startPoint = { type: 'Feature', geometry: { type: 'Point', coordinates: start } };
            const endPoint = { type: 'Feature', geometry: { type: 'Point', coordinates: end } };
            map.getSource('highlighted-node-source').setData({
                type: 'FeatureCollection',
                features: [startPoint, endPoint]
            });

            // 3. Draw teammates path lines with medium visibility, others dark dim
            map.setPaintProperty('migration-paths-layer', 'line-opacity', [
                'case',
                ['==', ['get', 'nationalTeam'], player['National Team']], 0.60,
                0.03
            ]);

            // Draw birth towns of teammates
            const teammates = PLAYERS_DATA.filter(p => p['National Team'] === player['National Team']);
            const birthTownFeatures = teammates.map(p => ({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [p.Longitude, p.Latitude] },
                properties: { name: p.name, pos: p.Pos, club: p.Club, birthTown: p['Birth town'], birthCountry: p['Birth country'] }
            }));
            map.getSource('birth-towns-source').setData({ type: 'FeatureCollection', features: birthTownFeatures });

            // 4. Render details card and open mobile sheet
            renderPlayerPanel(player);
            setDrawerHeight('half');
        }

        // Fit map viewport to encompass coordinates with padding
        function fitBoundsToCoordinates(p1, p2) {
            const lats = [p1[1], p2[1]];
            const lngs = [p1[0], p2[0]];

            let minLng, maxLng;
            if (Math.abs(lngs[0] - lngs[1]) > 180) {
                // Coordinates wrap around, use the interpolated path nodes coordinates boundary
                const arc = interpolateGreatCircle(p1, p2, 10);
                const arcLngs = arc.map(c => c[0]);
                minLng = Math.min(...arcLngs);
                maxLng = Math.max(...arcLngs);
            } else {
                minLng = Math.min(...lngs);
                maxLng = Math.max(...lngs);
            }

            const minLat = Math.min(...lats);
            const maxLat = Math.max(...lats);

            const leftPadding = window.innerWidth < 700 ? 40 : 420;

            map.fitBounds(
                [[minLng, minLat], [maxLng, maxLat]],
                {
                    padding: { top: 90, bottom: 90, left: leftPadding, right: 50 },
                    maxZoom: 5.5,
                    duration: 1500
                }
            );
        }

        function renderPresetPanel(preset) {

            let description = '';

            if (preset === 'factories') {
                title = "Western Europe's Talent Factories";
                subtitle = "France, Netherlands, and Germany";
                description = `
                    Western Europe serves as a massive exporter of talent at this World Cup. 
                    Collectively, 143 players born in <strong>France (76)</strong>, the <strong>Netherlands (42)</strong>, and <strong>Germany (25)</strong> 
                    are representing countries outside their birthplaces.
                    
                `;

                // Calculate top 10 exporters
                const { origins } = getAggregatedData();
                const topExporters = Object.values(origins)
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 10);

                listHtml = `
                    <div class="pt-4 border-t border-[#e2e8f0]">
                        <span class="block text-[10px] uppercase font-bold tracking-widest text-brand-textMuted mb-3">Top birthplaces of the World Cup’s foreign-born players</span>
                        <div class="space-y-2 max-h-64 overflow-y-auto no-scrollbar pr-1">
                            ${topExporters.map(o => {
                    const flag = getFlagTag(o.country);
                    return `
                                <div class="group flex items-center justify-between text-xs cursor-pointer hover:bg-slate-50 p-1.5 rounded transition country-link border border-transparent hover:border-slate-100" data-country-name="${o.country}" data-country-type="origin">
                                    <span class="font-semibold text-brand-navy group-hover:text-brand-coral transition">${flag}${o.country}</span>
                                    <div class="flex items-center gap-2">
                                        <div class="w-20 bg-[#faf8f5] border border-slate-200 h-2.5 rounded-full overflow-hidden">
                                            <div class="bg-brand-coral h-full rounded-full" style="width: ${(o.count / 76) * 100}%"></div>

            const content = `
                <div class="space-y-4">
                    <div>
                        <h3 class="font-serif text-lg font-bold text-brand-navy">${title}</h3>

        function renderCountryPanel(countryName, type, players) {
            const isSquad = type === 'squad';
            const title = countryName;
            const subtitle = isSquad ? "National Squad" : "Birthplace";
            const statText = isSquad
                ? `<strong>${players.length} foreign-born players</strong> on the roster.`
                : `<strong>${players.length} players born here</strong> representing other national teams.`;

            // Prepend flag if country is a squad (importer) or origin (exporter)
            const flag = getFlagTag(countryName);

            const content = `
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-serif text-2xl font-bold text-brand-navy">${flag}${title}</h3>
                                <p class="text-xs text-brand-coral font-medium uppercase tracking-wider">${subtitle}</p>
                            </div>
                            <button onclick="resetToGlobal()" class="text-xs text-slate-400 hover:text-brand-navy transition cursor-pointer">&times; Close</button>
                        </div>
                        <p class="mt-2 text-xs text-slate-600">${statText}</p>
                    </div>

                    <!-- Player list -->
                    <div>
                        <span class="block text-[10px] uppercase font-bold tracking-widest text-brand-textMuted mb-2">Player Roster</span>
                        <div class="divide-y divide-[#e2e8f0] max-h-60 overflow-y-auto no-scrollbar border border-slate-100 rounded-lg bg-white">
                            ${players.map(p => {
                const flag = getFlagTag(p['National Team']);
                return `
                                <div class="player-row p-2.5 hover:bg-slate-50 cursor-pointer flex items-center justify-between text-xs transition" data-player-name="${p.name}">
                                    <div>
                                        <div class="font-semibold text-brand-navy">${p.name}</div>
                                        <div class="text-[10px] text-brand-textMuted">${p.Pos} | ${p.Club}</div>

                    </div>

            document.getElementById('desktop-details').innerHTML = content;
            document.getElementById('mobile-details').innerHTML = content;

        function renderPlayerPanel(player) {
            const flag = getFlagTag(player['National Team']);

            const backButtonText = `&larr; Back to ${player['National Team']} Roster`;

            const content = `
                <div class="space-y-4">
                    <button class="back-to-roster-btn text-[11px] font-semibold text-brand-coral hover:text-brand-navy transition cursor-pointer" data-team-name="${player['National Team']}">${backButtonText}</button>
                    
                    <div class="p-4 bg-white border border-[#e8e4db] rounded-xl shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-serif text-2xl font-bold text-brand-navy">${player.name}</h3>
                                <div class="flex gap-2 items-center mt-1 text-[11px] font-medium text-brand-textMuted">
                                    <span class="bg-slate-100 px-2 py-0.5 rounded">${player.Pos}</span>
                                    <span>${player.Club}</span>
                                    <span class="bg-[#f2edd5] text-[#b35a38] px-2 py-0.5 rounded">Group ${player.Group}</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Migration details -->
                        <div class="mt-4 pt-3 border-t border-slate-100 text-xs text-slate-700 leading-relaxed space-y-2">
                            <p>
                                <strong>Birthplace:</strong> ${(() => {
                    const cleanTown = cleanTownName(player['Birth town'], player['Birth country']);
                    return cleanTown
                        ? `${cleanTown}, <strong>${getFlagTag(player['Birth country'])}${player['Birth country']}</strong>`
                        : `<strong>${getFlagTag(player['Birth country'])}${player['Birth country']}</strong>`;
                })()}.
                            </p>
                            <p>
                                <strong>Playing for:</strong> <strong>${flag}${player['National Team']}</strong>.
                            </p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('desktop-details').innerHTML = content;
            document.getElementById('mobile-details').innerHTML = content;
        }



        // Select player helper by string name
        function selectPlayerByName(playerName) {
            const p = PLAYERS_DATA.find(x => x.name === playerName);
            if (p) selectPlayer(p);
        }

        function resetToGlobal() {
            selectPreset('global');
        }

        // Set Mobile drawer heights
        function setDrawerHeight(state) {
            const drawer = document.getElementById('mobile-drawer');
            if (!drawer) return;
            drawerState = state;
            if (state === 'collapsed') {
                drawer.style.height = '15vh';
            } else if (state === 'half') {
                drawer.style.height = '45vh';
            } else if (state === 'expanded') {
                drawer.style.height = '85vh';
            }
        }

        // Mobile drawer drag handle click toggling cycle
        document.getElementById('mobile-drawer-handle').addEventListener('click', () => {
            if (drawerState === 'collapsed') {
                setDrawerHeight(selectedEntity ? 'half' : 'expanded');
            } else if (drawerState === 'half') {
                setDrawerHeight('expanded');
            } else {
                setDrawerHeight(selectedEntity ? 'half' : 'collapsed');
            }
        });

        // Setup Search and Autocomplete functionality
        function setupSearch() {
            const desktopInput = document.getElementById('desktop-search');
            const mobileInput = document.getElementById('mobile-search');
            const desktopResults = document.getElementById('desktop-search-results');
            const mobileResults = document.getElementById('mobile-search-results');
            const desktopClear = document.getElementById('desktop-search-clear');
            const mobileClear = document.getElementById('mobile-search-clear');

            function handleSearchInput(e, resultsBox, clearBtn) {
                const query = e.target.value.toLowerCase().trim();

                if (query === '') {
                    resultsBox.innerHTML = '';
                    resultsBox.classList.add('hidden');
                    clearBtn.classList.add('hidden');
                    return;
                }

                clearBtn.classList.remove('hidden');

                const matchingPlayers = PLAYERS_DATA.filter(p => p.name.toLowerCase().includes(query)).slice(0, 5);

                const squadsSet = new Set(PLAYERS_DATA.map(p => p['National Team']));
                const matchingSquads = Array.from(squadsSet).filter(s => s.toLowerCase().includes(query)).slice(0, 3);

                const originsSet = new Set(PLAYERS_DATA.map(p => p['Birth country']));
                const matchingOrigins = Array.from(originsSet).filter(o => o.toLowerCase().includes(query)).slice(0, 3);

                let html = '';

                if (matchingSquads.length > 0) {
                    html += `<div class="p-2 bg-slate-50 font-bold text-[10px] uppercase text-brand-textMuted tracking-wider">National Squads</div>`;
                    matchingSquads.forEach(s => {
                        const flag = getFlagTag(s);
                        html += `<div class="p-2 hover:bg-slate-100 cursor-pointer font-semibold search-result-item" data-type="squad" data-value="${s}">${flag}${s} Squad</div>`;
                    });
                }

                if (matchingOrigins.length > 0) {
                    html += `<div class="p-2 bg-slate-50 font-bold text-[10px] uppercase text-brand-textMuted tracking-wider">Birth Countries</div>`;
                    matchingOrigins.forEach(o => {
                        const flag = getFlagTag(o);
                        html += `<div class="p-2 hover:bg-slate-100 cursor-pointer font-semibold search-result-item" data-type="origin" data-value="${o}">Born in ${flag}${o}</div>`;
                    });
                }

                if (matchingPlayers.length > 0) {
                    html += `<div class="p-2 bg-slate-50 font-bold text-[10px] uppercase text-brand-textMuted tracking-wider">Players</div>`;
                    matchingPlayers.forEach(p => {
                        const flag = getFlagTag(p['National Team']);
                        html += `<div class="p-2 hover:bg-slate-100 cursor-pointer flex justify-between search-result-item" data-type="player" data-value="${p.name}">
                            <span>${p.name} <span class="text-slate-400 font-normal">(${p.Pos})</span></span>
                            <span class="text-slate-400 font-normal">${flag}${p['National Team']}</span>
                        </div>`;
                    });
                }

                if (html === '') {
                    html = `<div class="p-3 text-slate-400 text-center italic">No results found</div>`;
                }

                resultsBox.innerHTML = html;
                resultsBox.classList.remove('hidden');
            }

            desktopInput.addEventListener('input', (e) => handleSearchInput(e, desktopResults, desktopClear));
            mobileInput.addEventListener('input', (e) => handleSearchInput(e, mobileResults, mobileClear));

            // Hide suggestions on outside clicks
            document.addEventListener('click', (e) => {
                if (!desktopInput.contains(e.target) && !desktopResults.contains(e.target)) {
                    desktopResults.classList.add('hidden');
                }
                if (!mobileInput.contains(e.target) && !mobileResults.contains(e.target)) {
                    mobileResults.classList.add('hidden');
                }
            });
        }

        function handleSearchSelect(type, val) {
            document.getElementById('desktop-search-results').classList.add('hidden');
            document.getElementById('mobile-search-results').classList.add('hidden');

            if (type === 'squad') {
                setViewMode('squads', false);
                selectCountry(val, 'squad');
            } else if (type === 'origin') {
                setViewMode('origins', false);
                selectCountry(val, 'origin');
            } else if (type === 'player') {
                selectPlayerByName(val);
            }
        }

        function clearSearch() {
            document.getElementById('desktop-search').value = '';
            document.getElementById('mobile-search').value = '';
            document.getElementById('desktop-search-results').classList.add('hidden');
            document.getElementById('mobile-search-results').classList.add('hidden');
            document.getElementById('desktop-search-clear').classList.add('hidden');
            document.getElementById('mobile-search-clear').classList.add('hidden');
            resetToGlobal();
        }

        // Sidebar Collapse / Expand Functionality
        function toggleSidebar(collapse) {
            const sidebar = document.getElementById('sidebar-wrapper');
            const expandBtn = document.getElementById('sidebar-expand-btn');
            const collapseBtn = document.getElementById('sidebar-collapse-btn');

            if (collapse) {
                sidebar.classList.add('sidebar-collapsed');
                expandBtn.classList.remove('hidden');
                collapseBtn.classList.add('hidden');
            } else {
                sidebar.classList.remove('sidebar-collapsed');
                expandBtn.classList.add('hidden');
                collapseBtn.classList.remove('hidden');
            }

            // Recalculate Map Canvas Dimensions
            setTimeout(() => {
                if (map) map.resize();
            }, 310);
        }

        // Bind collapsible button events
        document.getElementById('sidebar-collapse-btn').addEventListener('click', () => toggleSidebar(true));
        document.getElementById('sidebar-expand-btn').addEventListener('click', () => toggleSidebar(false));

        // Global Event Delegation for Dynamic Elements Clicks
        document.addEventListener('click', (e) => {
            // Player list row clicked
            const playerRow = e.target.closest('.player-row');
            if (playerRow) {
                const playerName = playerRow.getAttribute('data-player-name');
                selectPlayerByName(playerName);
                return;
            }

            // Country link clicked
            const countryLink = e.target.closest('.country-link');
            if (countryLink) {
                const countryName = countryLink.getAttribute('data-country-name');
                const countryType = countryLink.getAttribute('data-country-type');
                selectCountry(countryName, countryType);
                return;
            }

            // Back button clicked
            const backBtn = e.target.closest('.back-to-roster-btn');
            if (backBtn) {
                const teamName = backBtn.getAttribute('data-team-name');
                selectCountry(teamName, 'squad');
                return;
            }

            // Autocomplete search result item clicked
            const searchItem = e.target.closest('.search-result-item');
            if (searchItem) {
                const type = searchItem.getAttribute('data-type');
                const val = searchItem.getAttribute('data-value');
                handleSearchSelect(type, val);
                return;
            }
        });

        // Handle resize layout updates
        window.addEventListener('resize', () => {
            if (map) {
                map.resize();
            }
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                if (map) map.resize();
            }, 200);
        });

        // Bootstrap the application
        initMap();
        setupSearch();
    </script>
